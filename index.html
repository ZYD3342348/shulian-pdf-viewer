<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>阅读器</title>
  <link rel="stylesheet" href="viewer.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script type="text/javascript" src="https://res.wx.qq.com/open/js/jweixin-1.3.2.js"></script>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div id="loadingText">正在为您加载文档...</div>
  </div>

  <div id="viewerContainer" class="viewer-container" style="display: none;">
    <canvas id="pdf-render"></canvas>
  </div>

  <div id="controls" class="controls">
    <button id="prevBtn" class="control-btn" aria-label="上一页">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    
    <div class="page-info">
      <span id="page_num">1</span> / <span id="page_count">-</span>
    </div>
    
    <button id="nextBtn" class="control-btn" aria-label="下一页">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div id="trial-mask" class="trial-mask" style="display: none;">
    <div class="trial-content">
      <h2>试读结束</h2>
      <p>免费试读部分已结束，购买后即可阅读全书！</p>
      <button id="buyBtn" class="buy-btn">前往购买</button>
    </div>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
